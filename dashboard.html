<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>StealthMonkey- Dashboard</title>
    <style>
        :root {
            --bg-base: #0b0e14;
            --accent: #7fb4ff;
            --accent-glow: rgba(127, 180, 255, 0.3);
            --text: #cdd6f4;
            --glass: rgba(30, 30, 46, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger: #f38ba8;
            --success: #a6e3a1;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg-base); 
            color: var(--text); display: flex; height: 100vh; overflow: hidden; position: relative;
        }

        body::before {
            content: ''; position: absolute; top: -100px; left: -100px; width: 400px; height: 400px;
            background: var(--accent-glow); border-radius: 50%; filter: blur(80px); z-index: 0;
        }

        #sidebar { 
            width: 280px; background: var(--glass); backdrop-filter: blur(20px);
            padding: 20px; border-right: 1px solid var(--glass-border); 
            display: flex; flex-direction: column; z-index: 10;
        }
        
        h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 20px; }

        .btn-modern { 
            padding: 12px; background: linear-gradient(135deg, var(--accent), #b4befe); 
            color: #11111b; border: none; border-radius: 8px; cursor: pointer; 
            font-weight: bold; margin-bottom: 20px; transition: 0.3s;
        }
        .btn-modern:hover { transform: translateY(-2px); box-shadow: 0 5px 15px var(--accent-glow); }

        ul { list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1; }
        li { 
            padding: 12px; background: rgba(255,255,255,0.03); margin-bottom: 8px; 
            border-radius: 10px; cursor: pointer; display: flex; justify-content: space-between; 
            align-items: center; border: 1px solid transparent; transition: 0.2s;
        }
        li:hover { background: rgba(255,255,255,0.08); border-color: var(--glass-border); }
        li.active { background: var(--accent-glow); border-color: var(--accent); }
        
        .btn-del { color: var(--danger); font-size: 10px; font-weight: bold; border: 1px solid var(--danger); padding: 3px 6px; border-radius: 5px; opacity: 0.5; }
        li:hover .btn-del { opacity: 1; }

        #editor-container { flex: 1; display: flex; flex-direction: column; z-index: 5; padding: 20px; gap: 15px; }

        .search-panel {
            background: var(--glass); backdrop-filter: blur(10px); padding: 12px 20px; 
            border-radius: 12px; border: 1px solid var(--glass-border);
            display: flex; align-items: center; gap: 12px;
        }
        .search-panel input {
            background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white;
            padding: 8px 12px; border-radius: 6px; outline: none; flex: 1; font-size: 13px;
        }
        .search-panel input:focus { border-color: var(--accent); }
        .search-panel button { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff; cursor: pointer; padding: 6px 12px; border-radius: 6px; font-size: 12px; }
        .search-panel button:hover { background: var(--accent); color: #000; }

        .ide-wrapper { 
            flex: 1; display: flex; background: rgba(20, 20, 30, 0.7); 
            border: 1px solid var(--glass-border); border-radius: 15px; overflow: hidden; backdrop-filter: blur(10px);
        }
        
        .line-numbers {
            width: 50px; background: rgba(0,0,0,0.2); color: #585b70; 
            text-align: right; padding: 20px 10px 0 0; font-family: 'Fira Code', monospace; 
            font-size: 14px; line-height: 22px; border-right: 1px solid var(--glass-border); cursor: pointer;
        }
        .line-numbers div:hover { color: var(--accent); background: rgba(255,255,255,0.05); }

        .code-viewport { position: relative; flex: 1; overflow: hidden; }

        #codigoUsuario { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: transparent; color: transparent; caret-color: var(--accent); 
            font-family: 'Fira Code', monospace; border: none; 
            padding: 20px; resize: none; font-size: 14px; outline: none; 
            line-height: 22px; z-index: 2; white-space: pre; overflow: auto; tab-size: 4;
        }
       .gering-footer { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    gap: 8px; 
    font-size: 11px; 
    color: var(--text-muted); 
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid var(--glass-border); 
    padding: 10px; 
    border-radius: 20px; 
    margin-top: 15px;
    text-transform: uppercase; 
    letter-spacing: 0.5px;
}

.gering-footer a { 
    color: var(--accent); 
    text-decoration: none; 
    font-weight: bold; 
    transition: 0.2s;
}

.gering-footer a:hover { 
    color: #b4befe; 
    text-shadow: 0 0 5px var(--accent-glow);
}

.gering-icon { 
    width: 14px; 
    height: 14px; 
    flex-shrink: 0; 
    filter: drop-shadow(0 0 2px rgba(255,255,255,0.2));
}
        #highlighting {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            margin: 0; padding: 20px; font-family: 'Fira Code', monospace;
            font-size: 14px; line-height: 22px; color: #d4d4d4; white-space: pre;
            pointer-events: none; z-index: 1; overflow: hidden;
        }
        .kwd { color: #569cd6; } /* keyword */
        .fnc { color: #dcdcaa; } /* function */
        .str { color: #ce9178; } /* string */
        .num { color: #b5cea8; } /* number */
        .cmt { color: #6a9955; font-style: italic; } /* comment */
        
        mark { background: rgba(255, 211, 112, 0.2); color: inherit; border-bottom: 2px solid #ffd370; }
        mark.current { background: rgba(255, 211, 112, 0.5) !important; outline: 1px solid #fff; }

        .footer { display: flex; justify-content: flex-end; padding-top: 10px; }
        #btnSalvar { 
            background: var(--success); color: #0b0e14; border: none; padding: 10px 25px; 
            font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        #btnSalvar:hover { box-shadow: 0 0 15px rgba(166, 227, 161, 0.4); transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="sidebar">
        
        <h2>StealthMonkey</h2>
        <button id="btnNovo" class="btn-modern">+ New Script</button>
        <ul id="listaScripts"></ul>
        <div class="gering-footer">
    <img src="icon.png" class="gering-icon" alt="Gering Icon" />
    <span>by <a href="https://portfolio-fullstack-liart.vercel.app/" target="_blank">Gering</a> • tech & ops</span>
</div>
    </div>
 
    </div>
    <div id="editor-container">
        <div class="search-panel">
            <input type="text" id="findInput" placeholder="Find patterns...">
            <input type="text" id="replaceInput" placeholder="Replace with...">
            <button id="btnNext">Next</button>
            <button id="btnReplace">Replace All</button>
            <span id="matchCounter" style="font-size: 11px; opacity: 0.6;">0/0</span>
        </div>

        <div class="ide-wrapper">
            <div class="line-numbers" id="lineNumbers"></div>
            <div class="code-viewport">
                <pre id="highlighting"></pre>
                <textarea id="codigoUsuario" spellcheck="false" wrap="off"></textarea>
            </div>
        </div>
        
        <div class="footer">
            <button id="btnConverter" style="background: var(--accent); color: #11111b; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-right: 15px;">
        Adaptar Código
    </button>
            <button id="btnSalvar">Save Script</button>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
